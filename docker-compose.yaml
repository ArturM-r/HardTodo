services:
  postgres:
    image: postgres:16
    container_name: postgres_ht
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_ht
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: api_ht
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      HMAC_KEY: ${HMAC_KEY}
    ports:
      - "8080:3000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: